
server.port=8080



# =========================
# EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# =========================
# SPRING CLOUD GATEWAY ROUTES
# =========================

# -------------------------
# USER SERVICE
# -------------------------
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**


# -------------------------
# USER PROFILE (same service)
# -------------------------
spring.cloud.gateway.routes[1].id=user-profile-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/*/profile/**


# -------------------------
# JOB SERVICE
# -------------------------
spring.cloud.gateway.routes[2].id=job-service
spring.cloud.gateway.routes[2].uri=lb://JOBSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/jobs/**


# -------------------------
# JOB APPLICATION SERVICE
# -------------------------
spring.cloud.gateway.routes[3].id=job-service
spring.cloud.gateway.routes[3].uri=lb://JOBSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/applications/**


# -------------------------
# RESUME SERVICE (NEW)
# -------------------------
spring.cloud.gateway.routes[4].id=resume-service
spring.cloud.gateway.routes[4].uri=lb://RESUMESERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/resumes/**


spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
